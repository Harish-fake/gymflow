name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Install dependencies
        working-directory: gymflow_mobile
        run: flutter pub get
      
      - name: Build APK
        working-directory: gymflow_mobile
        run: |
          flutter build apk --debug --android-skip-build-dependency-validation \
            --dart-define=API_BASE_URL=https://gymflow-api-3fh7.onrender.com/api \
            --dart-define=SUPABASE_URL=https://xcxeamroucnokdpilqsd.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjeGVhbXJvdWNub2tkcGlscXNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMDIxOTksImV4cCI6MjA5ODU3ODE5OX0.Y_A8vnrTqifmonMVQ5Wt1yTJlin5iyQpk0NozAGjZqU
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gymflow-apk
          path: gymflow_mobile/build/app/outputs/flutter-apk/*.apk
