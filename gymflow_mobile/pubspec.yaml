name: gymflow_mobile
description: GymFlow - Multi-gym Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  mobile_scanner: ^5.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  url_launcher: ^6.2.6
  flutter_local_notifications: ^17.2.1+2
  path: ^1.9.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
